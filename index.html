<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Journey East</title>
  <link href="https://fonts.googleapis.com/css2?family=Notable&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #000;
    }

    .scene {
      position: relative;
      width: 100%;
      height: 100%;
    }

    .noise {
      position: fixed;
      inset: 0;
      z-index: 999;
      pointer-events: none;
      opacity: 0.1;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 256px 256px;
    }

    .bg-layer {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }

    .bg-track {
      display: flex;
      width: 200%;
      height: 100%;
      animation: scroll-left 50s linear infinite;
    }

    .bg-img {
      width: 50%;
      height: 100%;
      flex-shrink: 0;
      background-image: url('Background com.jpg');
      background-size: 100% 100%;
      background-position: center;
    }

    @keyframes scroll-left {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }


    .ship-container {
      position: absolute;
      left: 0%;
      top: 50%;
      transform: translateY(-50%);
      width: 80vw;
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .ship {
      width: 100%;
      position: relative;
      z-index: 2;
      filter: drop-shadow(-15px -15px 1px rgba(29, 31, 37, 0.717));
    }

    .orbit {
      position: absolute;
      width: 65%;
      aspect-ratio: 1;
      border-radius: 50%;
      border: 2px solid #A96631;
      z-index: 1;
      left: 13%;
    }

    .orbit-inner {
      position: absolute;
      width: 62%;
      aspect-ratio: 1;
      border-radius: 50%;
      border: 10px solid #A96631;
      z-index: 1;
      left: 14.5%;
    }

    .satellite-wrap {
      position: absolute;
      left: 22%;
      top: 84%;
      transform: translate(-50%, -50%);
      z-index: 4;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 50px;
      height: 50px;
    }

    .satellite {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: #998a5a;
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      color: #a96631;
      line-height: 1;
    }

    .radials {
      position: absolute;
      width: 62%;
      aspect-ratio: 1;
      left: 14.5%;
      top: 50%;
      transform: translateY(-50%);
      z-index: 1;
      pointer-events: none;
    }

    .satellite-ring {
      position: absolute;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      border: 2px solid #998a5a;
    }

    .typewriter {
      position: fixed;
      bottom: 20px;
      left: 48px;
      z-index: 100;
      font-family: 'Notable', sans-serif;
      font-size: 13px;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      width: 0;
      border-right: 2px solid transparent;
    }

    .typewriter.active {
      border-right: 2px solid #fff;
      animation:
        typing 3.5s steps(54, end) forwards,
        cursor 0.75s step-end infinite;
    }

    .typewriter2 {
      position: fixed;
      bottom: 4px;
      left: 48px;
      z-index: 100;
      font-family: 'Notable', sans-serif;
      font-size: 13px;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      width: 0;
      border-right: 2px solid transparent;
    }

    .typewriter2.active {
      border-right: 2px solid #fff;
      animation:
        typing2 4s steps(51, end) forwards,
        cursor 0.75s step-end infinite;
    }

    @keyframes typing {
      from { width: 0; }
      to   { width: 38.7em; }
    }

    @keyframes typing2 {
      from { width: 0; }
      to   { width: 38.7em; }
    }

    @keyframes cursor {
      0%, 100% { border-color: #fff; }
      50%       { border-color: transparent; }
    }

    .corner-label {
      position: fixed;
      top: 50px;
      left: 0px;
      z-index: 100;
      font-family: 'Notable', sans-serif;
      font-size: 52px;
      color: #998a5a;
      letter-spacing: 0.15em;
      writing-mode: vertical-rl;
      text-orientation: mixed;
      transform: rotate(180deg);
      opacity: 0;
      transition: opacity 1s ease;
    }

    .bottom-right-label {
      position: fixed;
      bottom: 48px;
      left: 57vw;
      z-index: 100;
      font-family: 'Notable', sans-serif;
      font-size: 48px;
      color: #5c6b3f;
      letter-spacing: 0.05em;
      transform: scaleY(1.5);
      transform-origin: bottom left;
      opacity: 0;
      transition: opacity 1s ease;
    }

    .corner-label-right {
      position: fixed;
      top: -2px;
      left: calc(100vw - 8px - 16em);
      z-index: 100;
      font-family: 'Notable', sans-serif;
      font-size: 28px;
      color: #fff;
      letter-spacing: 0.1em;
      white-space: nowrap;
      overflow: hidden;
      width: 0;
      border-right: 2px solid transparent;
    }

    .corner-label-right.active {
      border-right: 2px solid #fff;
      animation:
        typing-top 2s steps(21, end) forwards,
        cursor 0.75s step-end infinite;
    }

    @keyframes typing-top {
      from { width: 0; }
      to   { width: 16em; }
    }

    .label-visible {
      opacity: 1 !important;
    }
  </style>
</head>
<body>
  <div class="noise"></div>
  <div class="corner-label">CARLIU</div>
  <div class="corner-label-right">MISSION: PREPARING...</div>
  <div class="bottom-right-label"><span style="display:inline-block;width:18px;height:18px;background:#5c6b3f;vertical-align:middle;margin-right:12px;margin-bottom:6px;"></span>JOURNEY EASTWARD</div>
  <div class="typewriter">2777.03.03 &nbsp; LOCATION: MILKY WAY GALAXY &nbsp; 8088.8388.8888</div>
  <div class="typewriter2">DESTINATION: WESTERN PLANET (CODE: OLD WEST PLANET)</div>
  <div class="scene">
    <div class="ship-container">
      <svg class="radials" viewBox="0 0 100 100">
        <line x1="50" y1="50" x2="100"  y2="50"   stroke="#f0f0f0" stroke-width="0.12"/>
        <line x1="50" y1="50" x2="96.2" y2="69.1" stroke="#f0f0f0" stroke-width="0.12"/>
        <line x1="50" y1="50" x2="85.4" y2="85.4" stroke="#f0f0f0" stroke-width="0.12"/>
        <line x1="50" y1="50" x2="69.1" y2="96.2" stroke="#f0f0f0" stroke-width="0.12"/>
        <line x1="50" y1="50" x2="50"   y2="100"  stroke="#f0f0f0" stroke-width="0.12"/>
        <line x1="50" y1="50" x2="30.9" y2="96.2" stroke="#f0f0f0" stroke-width="0.12"/>
        <line x1="50" y1="50" x2="14.6" y2="85.4" stroke="#f0f0f0" stroke-width="0.12"/>
        <line x1="50" y1="50" x2="3.8"  y2="69.1" stroke="#f0f0f0" stroke-width="0.12"/>
        <line x1="50" y1="50" x2="0"    y2="50"   stroke="#f0f0f0" stroke-width="0.12"/>
        <line x1="50" y1="50" x2="3.8"  y2="30.9" stroke="#f0f0f0" stroke-width="0.12"/>
        <line x1="50" y1="50" x2="14.6" y2="14.6" stroke="#f0f0f0" stroke-width="0.12"/>
        <line x1="50" y1="50" x2="30.9" y2="3.8"  stroke="#f0f0f0" stroke-width="0.12"/>
        <line x1="50" y1="50" x2="50"   y2="0"    stroke="#f0f0f0" stroke-width="0.12"/>
        <line x1="50" y1="50" x2="69.1" y2="3.8"  stroke="#f0f0f0" stroke-width="0.12"/>
        <line x1="50" y1="50" x2="85.4" y2="14.6" stroke="#f0f0f0" stroke-width="0.12"/>
        <line x1="50" y1="50" x2="96.2" y2="30.9" stroke="#f0f0f0" stroke-width="0.12"/>
      </svg>
      <div class="orbit"></div>
      <div class="orbit-inner"></div>
      <div class="satellite-wrap">
        <div class="satellite-ring"></div>
        <div class="satellite">※</div>
      </div>
      <img class="ship" src="Final ship!.png" alt="ship" />
    </div>
    <div class="bg-layer">
      <div class="bg-track">
        <div class="bg-img"></div>
        <div class="bg-img"></div>
      </div>
    </div>
  </div>
  <script>
    document.addEventListener('click', function handler() {
      document.querySelector('.typewriter').classList.add('active');
      document.querySelector('.typewriter2').classList.add('active');
      document.querySelector('.corner-label').classList.add('label-visible');
      document.querySelector('.corner-label-right').classList.add('active');
      document.querySelector('.bottom-right-label').classList.add('label-visible');
      document.removeEventListener('click', handler);
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Journey East</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #000;
    }

    .scene {
      position: relative;
      width: 100%;
      height: 100%;
    }

    .bg-layer {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }

    .bg-track {
      display: flex;
      width: 200%;
      height: 100%;
      animation: scroll-left 15s linear infinite;
    }

    .bg-img {
      width: 50%;
      height: 100%;
      flex-shrink: 0;
      background-image: url('Background web (2).jpg');
      background-size: cover;
      background-position: center;
    }

    @keyframes scroll-left {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }

    .border-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      mix-blend-mode: multiply;
      z-index: 10;
    }

    .border-overlay::before,
    .border-overlay::after {
      content: '';
      position: absolute;
      left: 0;
      width: 100%;
      height: 52px;
    }

    .border-overlay::before {
      top: 0;
      background: #b46632;
    }

    .border-overlay::after {
      bottom: 0;
      background: #b46632;
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="border-overlay"></div>
    <div class="bg-layer">
      <div class="bg-track">
        <div class="bg-img"></div>
        <div class="bg-img"></div>
      </div>
    </div>
  </div>
</body>
</html>
